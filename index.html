<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3D Spin the Wheel — Indie Photoreal</title>
<style>
  html,body{height:100%;margin:0;background:#111;overflow:hidden;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  #container{width:100%;height:100%;position:relative}
  canvas{display:block}
  .ui {
    position:absolute; right:20px; top:20px; width:340px;
    background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
    padding:14px; border-radius:12px; color:#eef; backdrop-filter: blur(8px) saturate(120%);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  }
  .ui h1{margin:0 0 8px 0;font-size:16px;letter-spacing:0.4px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .btn{flex:1;padding:8px;border-radius:8px;border:none;background:linear-gradient(180deg,#2b2b2f,#222);color:#fff;cursor:pointer}
  .small{padding:6px;font-size:13px}
  .seg-list{max-height:280px;overflow:auto;margin:8px 0;padding-right:6px}
  .seg-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
  .seg-row input[type=text]{flex:1;padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#fff}
  .seg-row input[type=color]{width:40px;height:34px;border-radius:6px;border:1px solid rgba(0,0,0,0.2);padding:0}
  .seg-row button{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#fff;padding:6px;border-radius:8px}
  label{font-size:12px;color:#cfe}
  .footer{font-size:12px;opacity:0.8;margin-top:8px}
  #overlay-winner{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);pointer-events:none;font-size:28px;color:#fffb; text-shadow:0 4px 30px rgba(0,0,0,0.7); display:none}
  #audio-hint{position:absolute;left:50%;top:10%;transform:translateX(-50%);background:rgba(0,0,0,0.45);color:#fff;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(6px);font-size:14px}
  /* responsive */
  @media(max-width:720px){ .ui{right:10px;left:10px;width:auto} }
</style>
</head>
<body>
<div id="container"></div>
<div class="ui" id="ui">
  <h1>Spin the Wheel</h1>
  <div class="controls">
    <button class="btn" id="spinBtn">SPIN</button>
    <button class="btn small" id="stopBtn">BRAKE</button>
  </div>
  <label>Wheel segments (editable):</label>
  <div class="seg-list" id="segList"></div>
  <div style="display:flex;gap:8px">
    <button class="btn small" id="addSeg">+ Add</button>
    <button class="btn small" id="resetSeg">Reset</button>
  </div>
  <div style="margin-top:8px">
    <label>Camera: drag to rotate, wheel spin unaffected</label>
  </div>
  <div class="footer">Photoreal PBR • HDR-like lighting • Bloom • Confetti • WebAudio SFX</div>
</div>
<div id="overlay-winner"></div>
<div id="audio-hint">Click or tap to enable audio and interactions</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.152.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.152.0/examples/jsm/controls/OrbitControls.js';
import { EffectComposer } from 'https://unpkg.com/three@0.152.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://unpkg.com/three@0.152.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://unpkg.com/three@0.152.0/examples/jsm/postprocessing/UnrealBloomPass.js';
import { SMAAPass } from 'https://unpkg.com/three@0.152.0/examples/jsm/postprocessing/SMAAPass.js';
import { ShaderPass } from 'https://unpkg.com/three@0.152.0/examples/jsm/postprocessing/ShaderPass.js';
import { FXAAShader } from 'https://unpkg.com/three@0.152.0/examples/jsm/shaders/FXAAShader.js';

const container = document.getElementById('container');
const overlayWinner = document.getElementById('overlay-winner');
let camera, scene, renderer, composer, controls;
let wheelGroup, wheelMaterial;
let clock = new THREE.Clock();
const size = {w: window.innerWidth, h: window.innerHeight};
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let spinOscGain, spinOsc;

// Wheel data (editable)
let segments = [
  {label:'Prize A', color:'#ff6b6b'},
  {label:'Prize B', color:'#ffd56b'},
  {label:'Prize C', color:'#6bffcd'},
  {label:'Prize D', color:'#6bb7ff'},
  {label:'Prize E', color:'#c56bff'},
  {label:'Prize F', color:'#6bff8f'}
];

// Physics state
let angle = 0;           // radians
let angularVel = 0;      // rad/s
let angularAccel = 0;    // rad/s^2
let isSpinning = false;
let lastTickIndex = -1;
let spinStartTime = 0;

// Confetti system
let confettiPool = [];
const confettiGroup = new THREE.Group();

// Initialize
init();
animate();

async function init(){
  // Renderer
  renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(size.w, size.h);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  container.appendChild(renderer.domElement);

  // Scene & camera
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(40, size.w/size.h, 0.1, 200);
  camera.position.set(0, 3.2, 6);

  // Procedural "HDR" equirectangular canvas
  const envTex = createEquirectangularHDR(1024, 512);
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const envMap = pmrem.fromEquirectangular(envTex).texture;
  scene.environment = envMap;
  scene.background = envTex;

  // Ground
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({color:0x0b0b0b, roughness:0.9, metalness:0.0})
  );
  ground.rotation.x = -Math.PI/2;
  ground.position.y = -0.01;
  scene.add(ground);

  // Stage plinth (PBR)
  const plinth = new THREE.Mesh(
    new THREE.CylinderGeometry(1.5, 1.6, 0.6, 64),
    new THREE.MeshStandardMaterial({color:0x111318, roughness:0.35, metalness:0.6, reflectivity:0.8})
  );
  plinth.position.y = -0.3;
  scene.add(plinth);

  // Wheel: build as a group with two textured circle faces
  const wheelRadius = 1.6;
  const wheelDepth = 0.18;
  // create material with dynamic map for faces
  const canvas = drawWheelCanvas(2048, 2048, segments);
  const texture = new THREE.CanvasTexture(canvas);
  texture.encoding = THREE.sRGBEncoding;
  texture.anisotropy = 8;
  wheelMaterial = new THREE.MeshStandardMaterial({
    map: texture,
    roughnessMap: generateRoughnessMap(canvas),
    metalness: 0.2,
    metalnessMap: generateMetalnessMap(canvas),
    roughness: 0.45,
    envMap: envMap,
    envMapIntensity: 1.2,
    side: THREE.DoubleSide
  });
  const front = new THREE.Mesh(new THREE.CircleGeometry(wheelRadius, 256), wheelMaterial);
  const back = new THREE.Mesh(new THREE.CircleGeometry(wheelRadius, 256), wheelMaterial);
  front.position.z = wheelDepth * 0.5;
  back.position.z = -wheelDepth * 0.5;
  back.rotation.y = Math.PI;
  front.receiveShadow = back.receiveShadow = true;
  wheelGroup = new THREE.Group();
  wheelGroup.add(front);
  wheelGroup.add(back);
  wheelGroup.position.y = 0.55;
  scene.add(wheelGroup);

  // Wheel rim (glass/metal)
  const rim = new THREE.Mesh(
    new THREE.TorusGeometry(wheelRadius+0.03, 0.08, 24, 200),
    new THREE.MeshPhysicalMaterial({color:0x22263a, roughness:0.25, metalness:0.9, clearcoat:0.6, reflectivity: 1.0})
  );
  rim.position.copy(wheelGroup.position);
  rim.rotation.x = Math.PI/2;
  scene.add(rim);

  // Pointer (arrow) - metallic
  const pointer = new THREE.Mesh(
    new THREE.ConeGeometry(0.15, 0.5, 24),
    new THREE.MeshStandardMaterial({color:0xfff7d6, metalness:0.95, roughness:0.22})
  );
  pointer.position.set(0, 1.2, 0);
  pointer.rotation.x = Math.PI;
  scene.add(pointer);

  // Add a small soft area light using emissive sphere
  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 16, 12),
    new THREE.MeshBasicMaterial({color:0xfff1cc})
  );
  bulb.position.set(1.8, 2.6, 1.8);
  scene.add(bulb);

  // Add some emissive rim lights and small fill lights for indie aesthetic
  const hemi = new THREE.HemisphereLight(0xffffff, 0x080820, 0.4);
  scene.add(hemi);
  const key = new THREE.DirectionalLight(0xfff8da, 1.1);
  key.position.set(3,5,1);
  scene.add(key);

  // Add confetti group
  scene.add(confettiGroup);

  // Postprocessing: composer with bloom and anti-alias
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(new THREE.Vector2(size.w, size.h), 0.9, 0.6, 0.1);
  bloom.threshold = 0.15;
  bloom.strength = 0.9;
  bloom.radius = 0.6;
  composer.addPass(bloom);
  const smaa = new SMAAPass(size.w * renderer.getPixelRatio(), size.h * renderer.getPixelRatio());
  composer.addPass(smaa);
  const fxaa = new ShaderPass(FXAAShader);
  fxaa.uniforms['resolution'].value.set(1/size.w, 1/size.h);
  composer.addPass(fxaa);

  // Controls
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.075;
  controls.minDistance = 3;
  controls.maxDistance = 10;
  controls.maxPolarAngle = Math.PI/2.2;

  // Handle resize
  window.addEventListener('resize', onWindowResize);

  // UI binding
  setupUI(canvas, texture);
  setupAudio();
  setupWheelInteraction();

  // initial tick index
  lastTickIndex = -1;
}

// Draw a wheel texture to a canvas with radial segments
function drawWheelCanvas(w,h, segs){
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  // high-dynamic picks: radiant background
  const grd = ctx.createLinearGradient(0,0,w,0);
  grd.addColorStop(0, '#0f1720');
  grd.addColorStop(1, '#081018');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,w,h);

  const cx = w/2, cy = h/2, r = Math.min(w,h)*0.45;
  const n = segs.length;
  const segAngle = Math.PI*2 / n;

  // center disc
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx,cy, r*0.12, 0, Math.PI*2);
  ctx.fillStyle = '#0b0f14';
  ctx.fill();
  ctx.restore();

  // draw segments
  for(let i=0;i<n;i++){
    const a0 = -Math.PI/2 + i*segAngle;
    const a1 = a0 + segAngle;
    // segment color
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a0,a1);
    ctx.closePath();
    ctx.fillStyle = segs[i].color;
    // subtle radial gradient per segment for PBR look
    const midAng = (a0+a1)/2;
    const gx = cx + Math.cos(midAng)*r*0.45;
    const gy = cy + Math.sin(midAng)*r*0.45;
    const grad = ctx.createRadialGradient(gx,gy,r*0.02, cx,cy, r);
    grad.addColorStop(0, shadeColor(segs[i].color, 0.15));
    grad.addColorStop(0.6, segs[i].color);
    grad.addColorStop(1, shadeColor(segs[i].color, -0.18));
    ctx.fillStyle = grad;
    ctx.fill();

    // inner bevel
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = Math.max(2, r*0.01);
    ctx.stroke();

    // label
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate((a0+a1)/2);
    ctx.translate(r*0.58,0);
    ctx.rotate(Math.PI/2);
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.round(r*0.12)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    wrapText(ctx, segs[i].label, 0, 0, r*0.8, Math.round(r*0.12));
    ctx.restore();
  }

  // outer metal ring
  ctx.beginPath();
  ctx.arc(cx,cy, r+Math.round(r*0.055), 0, Math.PI*2);
  ctx.lineWidth = Math.round(r*0.11);
  const ringGrad = ctx.createLinearGradient(0,0,w,h);
  ringGrad.addColorStop(0, '#444459');
  ringGrad.addColorStop(0.5, '#1b1c22');
  ringGrad.addColorStop(1, '#33324a');
  ctx.strokeStyle = ringGrad;
  ctx.stroke();

  // subtle scratches/highlight
  ctx.beginPath();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#fff';
  for(let i=0;i<30;i++){
    const ang = Math.random()*Math.PI*2;
    const rr = r + Math.random()*r*0.12;
    ctx.moveTo(cx + Math.cos(ang)*(rr-4), cy + Math.sin(ang)*(rr-4));
    ctx.lineTo(cx + Math.cos(ang)*(rr+4), cy + Math.sin(ang)*(rr+4));
  }
  ctx.stroke();
  ctx.globalAlpha = 1.0;

  return cv;
}

// Generate simple roughness map from base canvas (simulate varied roughness)
function generateRoughnessMap(baseCanvas){
  const cw = baseCanvas.width, ch = baseCanvas.height;
  const c = document.createElement('canvas'); c.width=cw;c.height=ch;
  const ctx=c.getContext('2d');
  ctx.drawImage(baseCanvas,0,0);
  let id = ctx.getImageData(0,0,cw,ch);
  for(let i=0;i<id.data.length;i+=4){
    const r = id.data[i], g = id.data[i+1], b = id.data[i+2];
    const lum = (r+g+b)/3;
    const rough = 255 - Math.round((lum/255)*120 + Math.random()*30);
    id.data[i]=id.data[i+1]=id.data[i+2]=rough;
  }
  ctx.putImageData(id,0,0);
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.LinearEncoding;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// Very subtle metalness map
function generateMetalnessMap(baseCanvas){
  const cw = baseCanvas.width, ch = baseCanvas.height;
  const c = document.createElement('canvas'); c.width=cw;c.height=ch;
  const ctx=c.getContext('2d');
  ctx.drawImage(baseCanvas,0,0);
  let id = ctx.getImageData(0,0,cw,ch);
  for(let i=0;i<id.data.length;i+=4){
    const r = id.data[i], g = id.data[i+1], b = id.data[i+2];
    const lum = (r+g+b)/3;
    const metal = Math.round((lum/255)*40);
    id.data[i]=id.data[i+1]=id.data[i+2]=metal;
  }
  ctx.putImageData(id,0,0);
  const tex = new THREE.CanvasTexture(c);
  tex.encoding = THREE.LinearEncoding;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// Create a simple equirectangular "HDR-like" canvas texture (sky gradient + sun)
function createEquirectangularHDR(w=1024, h=512){
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');

  // gradient sky
  const grd = ctx.createLinearGradient(0,0,0,h);
  grd.addColorStop(0, '#bfdfff');
  grd.addColorStop(0.3, '#88b8ff');
  grd.addColorStop(0.6, '#113026');
  grd.addColorStop(1, '#081018');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,w,h);

  // Add a soft sun
  const sunX = Math.round(w*0.15), sunY = Math.round(h*0.28);
  for(let i=0;i<120;i++){
    ctx.beginPath();
    ctx.globalAlpha = 0.015;
    ctx.fillStyle = 'rgba(255,245,200,1)';
    ctx.arc(sunX + (Math.random()-0.5)*20, sunY + (Math.random()-0.5)*10, 1+i*1.3, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // subtle cloud strokes
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  for(let i=0;i<40;i++){
    const cx = Math.random()*w, cy = Math.random()*h*0.6;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 120+Math.random()*200, 30+Math.random()*80, Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

// UI: build segment rows and bind events
function setupUI(wheelCanvas, wheelTexture){
  const segList = document.getElementById('segList');
  const addBtn = document.getElementById('addSeg');
  const resetBtn = document.getElementById('resetSeg');
  const spinBtn = document.getElementById('spinBtn');
  const stopBtn = document.getElementById('stopBtn');

  function renderSegList(){
    segList.innerHTML = '';
    segments.forEach((s, i)=>{
      const row = document.createElement('div'); row.className='seg-row';
      const txt = document.createElement('input'); txt.type='text'; txt.value=s.label;
      txt.addEventListener('input', (e)=>{ s.label = e.target.value; redrawWheel(); });
      const color = document.createElement('input'); color.type='color'; color.value=s.color;
      color.addEventListener('input', (e)=>{ s.color = e.target.value; redrawWheel(); });
      const del = document.createElement('button'); del.textContent='✕';
      del.addEventListener('click', ()=>{ segments.splice(i,1); redrawWheel(); renderSegList(); });
      row.appendChild(txt); row.appendChild(color); row.appendChild(del);
      segList.appendChild(row);
    });
  }
  function redrawWheel(){
    const cv = drawWheelCanvas(2048,2048,segments);
    wheelTexture.image = cv;
    wheelTexture.needsUpdate = true;
    wheelMaterial.roughnessMap = generateRoughnessMap(cv);
    wheelMaterial.metalnessMap = generateMetalnessMap(cv);
    wheelMaterial.needsUpdate = true;
  }
  addBtn.addEventListener('click', ()=>{
    segments.push({label:'New', color:randomColor()});
    renderSegList();
    redrawWheel();
    // scroll to bottom
    segList.scrollTop = segList.scrollHeight;
  });
  resetBtn.addEventListener('click', ()=>{
    segments = [
      {label:'Prize A', color:'#ff6b6b'},
      {label:'Prize B', color:'#ffd56b'},
      {label:'Prize C', color:'#6bffcd'},
      {label:'Prize D', color:'#6bb7ff'},
      {label:'Prize E', color:'#c56bff'},
      {label:'Prize F', color:'#6bff8f'}
    ];
    renderSegList(); redrawWheel();
  });
  spinBtn.addEventListener('click', ()=>{
    // apply impulse torque
    if(!isSpinning){
      isSpinning = true;
      spinStartTime = performance.now();
      const base = 10 + Math.random()*12; // base angular velocity
      const spinImpulse = base * (1 + Math.random()*1.5);
      angularVel += spinImpulse;
      // start whoosh sound
      startSpinSound();
    } else {
      // apply extra impulse if already spinning
      angularVel += 4 + Math.random()*5;
    }
  });
  stopBtn.addEventListener('click', ()=>{
    // apply braking torque
    angularVel *= 0.15;
    angularVel = Math.max(0, angularVel - 1.5);
  });

  renderSegList();
}

// Simple wheel interaction hooks (click to spin by dragging)
function setupWheelInteraction(){
  // Optionally add click-and-drag for spin or fancy interactions. Wheel spin unaffected by camera orbit.
  // Detect pointer on canvas to start spin by swipe.
  let startY=0, isDown=false, startTime=0;
  renderer.domElement.addEventListener('pointerdown', (e)=>{
    isDown=true; startY = e.clientY; startTime = performance.now();
  });
  window.addEventListener('pointerup', (e)=>{
    if(!isDown) return;
    isDown=false;
    const dy = startY - e.clientY;
    const dt = (performance.now() - startTime)/1000;
    const speed = (dy / (dt||0.001)) * 0.003;
    if(Math.abs(speed) > 2){
      angularVel += speed;
      isSpinning = true;
      startSpinSound();
    }
  });
}

// Physics and animation loop
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(0.033, clock.getDelta());
  controls.update();

  // Spin physics: angularVel updated, apply damping (simulate friction+air)
  if(isSpinning || Math.abs(angularVel) > 1e-3){
    // realistic damping with exponential decay and a small static friction
    const damping = 1.0 + 0.5 * Math.log(1+Math.abs(angularVel));
    angularAccel = -angularVel * 0.6 * dt; // high-level viscous friction
    angularVel += angularAccel;
    // clamp & stop when small
    if(Math.abs(angularVel) < 0.002 && performance.now() - spinStartTime > 600) {
      angularVel = 0;
      isSpinning = false;
      stopSpinSound(true);
      announceWinner();
    }
  }

  // Angle update
  angle += angularVel * dt;
  // apply to wheel group (rotation about Z axis)
  if(wheelGroup) wheelGroup.rotation.z = angle;

  // tick sound: when wheel passes segment boundary
  const n = segments.length;
  if(n>0){
    const segAngle = (Math.PI*2)/n;
    // compute current top segment index
    const normalized = ((-angle + Math.PI/2) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
    const idx = Math.floor(normalized / segAngle);
    if(idx !== lastTickIndex){
      // play tick only if spinning and velocity above threshold
      if(Math.abs(angularVel) > 0.25){
        playClickSound(0.9 + Math.random()*0.3);
      }
      lastTickIndex = idx;
    }
  }

  // Update spin whoosh oscillator frequency based on angularVel
  updateSpinSound(Math.abs(angularVel));

  // update confetti
  updateConfetti(dt);

  // render
  composer.render(dt);
}

// Winner announcement and confetti spawn
function announceWinner(){
  const n = segments.length;
  if(n===0) return;
  const segAngle = (Math.PI*2)/n;
  const normalized = ((-angle + Math.PI/2) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
  const idx = Math.floor(normalized / segAngle);
  const win = segments[idx];
  overlayWinner.style.display = 'block';
  overlayWinner.textContent = `Winner: ${win.label}`;
  // animate overlay fade-out after a bit and spawn confetti
  spawnConfetti(80, win.color);
  setTimeout(()=> overlayWinner.style.display = 'none', 4200);
  // small celebratory sound
  playBell();
}

// Confetti: create simple colored triangles/planes that fall with gravity
function spawnConfetti(count=60, color='#ffd56b'){
  for(let i=0;i<count;i++){
    const g = new THREE.PlaneGeometry(0.08 + Math.random()*0.28, 0.08 + Math.random()*0.28);
    const mat = new THREE.MeshStandardMaterial({
      color: randomColor(), 
      side: THREE.DoubleSide,
      roughness: 0.6,
      metalness: 0.2,
      transparent: true,
      opacity: 1.0
    });
    const mesh = new THREE.Mesh(g, mat);
    // position near wheel center
    mesh.position.set(
      (Math.random()-0.5)*0.6,
      1.0 + Math.random()*0.6,
      (Math.random()-0.5)*0.6
    );
    mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    mesh.userData.vel = new THREE.Vector3((Math.random()-0.5)*1.5, 1.2 + Math.random()*2.6, (Math.random()-0.5)*1.5);
    mesh.userData.spin = new THREE.Vector3(Math.random()*6, Math.random()*6, Math.random()*6);
    mesh.userData.lifetime = 3 + Math.random()*2;
    confettiGroup.add(mesh);
    confettiPool.push(mesh);
  }
  // play burst sound
  playConfettiSound();
}
function updateConfetti(dt){
  for(let i=confettiPool.length-1;i>=0;i--){
    const p = confettiPool[i];
    p.userData.lifetime -= dt;
    if(p.userData.lifetime <= 0){
      confettiGroup.remove(p);
      confettiPool.splice(i,1);
      p.geometry.dispose();
      p.material.dispose();
      continue;
    }
    // physics
    p.userData.vel.y -= 3.8 * dt; // gravity
    p.userData.vel.multiplyScalar(1 - 0.2*dt); // drag
    p.position.addScaledVector(p.userData.vel, dt);
    p.rotation.x += p.userData.spin.x * dt;
    p.rotation.y += p.userData.spin.y * dt;
    p.rotation.z += p.userData.spin.z * dt;
    // fade
    const t = p.userData.lifetime / 5;
    if(p.material.opacity !== undefined) p.material.opacity = Math.max(0, t);
  }
}

// Audio: spin whoosh (oscillator controlled by angularVel) and click/bell
function setupAudio(){
  // create master gain
  const master = audioCtx.createGain();
  master.gain.value = 0.9;
  master.connect(audioCtx.destination);

  // spin oscillator synth (sine + bandpass + gain)
  spinOsc = audioCtx.createOscillator();
  spinOsc.type = 'sawtooth';
  const spinFilter = audioCtx.createBiquadFilter();
  spinFilter.type = 'lowpass';
  spinFilter.frequency.value = 200;
  const spinGain = audioCtx.createGain();
  spinGain.gain.value = 0;
  spinOsc.connect(spinFilter);
  spinFilter.connect(spinGain);
  spinGain.connect(master);
  // Start the oscillator only after a user gesture — browsers block audio otherwise.
  document.body.addEventListener('pointerdown', () => {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    try{ spinOsc.start(); } catch(e){}
    const hint = document.getElementById('audio-hint'); if(hint) hint.style.display = 'none';
  }, {once:true});

  spinOscGain = spinGain;
}

function ensureAudio(){
  if(audioCtx.state === 'suspended'){
    audioCtx.resume().catch(()=>{});
  }
}

function startSpinSound(){
  if(audioCtx.state === 'suspended') audioCtx.resume();
  // ramp up gain quickly
  spinOscGain.gain.cancelScheduledValues(audioCtx.currentTime);
  spinOscGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.02);
}

function stopSpinSound(playFinal=false){
  spinOscGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.6);
  if(playFinal) {
    // short release whoosh
    setTimeout(()=>{}, 0);
  }
}

function updateSpinSound(speed){
  // map angularVel to oscillator frequency and filter freq
  if(!spinOsc) return;
  const freq = 80 + Math.min(2600, speed * 220);
  spinOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.02);
}

// Click sound when passing segment
function playClickSound(vol=1.0){
  if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  const o = audioCtx.createOscillator();
  o.type = 'square';
  o.frequency.value = 1100 + Math.random()*600;
  const g = audioCtx.createGain();
  g.gain.value = 0.0001;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  g.gain.linearRampToValueAtTime(0.14*vol, audioCtx.currentTime + 0.002);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  setTimeout(()=>{ o.stop(); o.disconnect(); g.disconnect(); }, 200);
}

// Confetti burst sound
function playConfettiSound(){
  if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  const now = audioCtx.currentTime;
  const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate*0.2, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for(let i=0;i<data.length;i++){ data[i] = (Math.random()*2-1) * Math.exp(-3*i/data.length); }
  const noise = audioCtx.createBufferSource(); noise.buffer = noiseBuffer;
  const g = audioCtx.createGain(); g.gain.value = 0.13;
  noise.connect(g); g.connect(audioCtx.destination);
  noise.start();
  noise.stop(now + 0.18);
}

// Simple celebratory bell
function playBell(){
  if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  const ctx = audioCtx;
  const o1 = ctx.createOscillator(); o1.type='sine';
  const o2 = ctx.createOscillator(); o2.type='sine';
  const g = ctx.createGain(); g.gain.value = 0.0001;
  o1.connect(g); o2.connect(g); g.connect(ctx.destination);
  o1.frequency.setValueAtTime(880, ctx.currentTime);
  o2.frequency.setValueAtTime(1320, ctx.currentTime);
  const now = ctx.currentTime;
  g.gain.linearRampToValueAtTime(0.18, now+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now+2.5);
  o1.start(); o2.start();
  o1.stop(now+2.6); o2.stop(now+2.6);
}

// Helpers
function onWindowResize(){
  size.w = window.innerWidth; size.h = window.innerHeight;
  camera.aspect = size.w/size.h; camera.updateProjectionMatrix();
  renderer.setSize(size.w, size.h);
  composer.setSize(size.w, size.h);
}

function shadeColor(color, percent){
  // input '#rrggbb' or name; return rgba-like hex
  const c = document.createElement('canvas'); const cx=c.getContext('2d');
  cx.fillStyle = color; const col = cx.fillStyle;
  // parse
  const m = col.match(/^#?([0-9a-f]{6})$/i);
  if(!m) return color;
  const num = parseInt(m[1],16);
  let r = (num>>16), g = (num>>8)&255, b = num&255;
  r = Math.min(255, Math.max(0, r + (r*percent)));
  g = Math.min(255, Math.max(0, g + (g*percent)));
  b = Math.min(255, Math.max(0, b + (b*percent)));
  return 'rgb(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b) + ')';
}
function randomColor(){
  const c = ['#ff6b6b','#ffd56b','#6bffcd','#6bb7ff','#c56bff','#6bff8f','#ff9f6b','#8affd5'];
  return c[Math.floor(Math.random()*c.length)];
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = text.split(' ');
  let line = '';
  let test = '';
  let lineCount = 0;
  for(let n=0;n<words.length;n++){
    test = line + words[n] + ' ';
    if(ctx.measureText(test).width > maxWidth && n>0){
      ctx.fillText(line, x, y + lineCount * lineHeight - (lineHeight*0.5));
      line = words[n] + ' ';
      lineCount++;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y + lineCount * lineHeight - (lineHeight*0.5));
}
