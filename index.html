<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spin the Wheel — Indie 2D</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #070b14;
    --panel: rgba(15, 23, 35, 0.86);
    --border: rgba(255, 255, 255, 0.12);
    --text: #f4f7ff;
    --muted: #8ea6c0;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:radial-gradient(circle at top, #17233f 0%, var(--bg) 52%, #04070d 100%);color:var(--text);font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;overflow:hidden}
  body{display:grid;place-items:center;padding:20px}
  .app{width:min(1120px, 100%);height:min(760px, 100%);display:grid;grid-template-columns:1.1fr 0.9fr;gap:20px;align-items:center}
  .wheel-card, .ui-card{background:var(--panel);border:1px solid var(--border);box-shadow:0 16px 60px rgba(0,0,0,0.45);backdrop-filter:blur(18px) saturate(150%);border-radius:24px}
  .wheel-card{position:relative;display:grid;place-items:center;min-height:540px;overflow:hidden;padding:22px}
  .wheel-card::before,.wheel-card::after{content:"";position:absolute;inset:auto;pointer-events:none;border-radius:999px;filter:blur(20px)}
  .wheel-shell{position:relative;display:grid;place-items:center;width:min(500px, 85vw);aspect-ratio:1;touch-action:manipulation}
  .wheel-card::before{width:260px;height:260px;top:-80px;right:-60px;background:rgba(255,192,77,0.16)}
  .wheel-card::after{width:220px;height:220px;bottom:-70px;left:-40px;background:rgba(96,203,255,0.14)}
  .wheel-shadow{position:absolute;inset:16% 12% auto;height:18%;background:radial-gradient(circle, rgba(0,0,0,0.45), transparent 70%);filter:blur(16px)}
  #wheelSvg{width:100%;height:100%;transform-origin:center;transition:transform 0.08s linear;filter:drop-shadow(0 18px 28px rgba(0,0,0,0.45));cursor:pointer}
  .pointer{position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:34px solid #ffe4a1;filter:drop-shadow(0 6px 12px rgba(0,0,0,0.35));z-index:2}
  .pointer::after{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:12px;height:36px;background:linear-gradient(180deg,#fff5b8,#dba64f);border-radius:999px}
  .hud{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);padding:10px 14px;border-radius:999px;background:rgba(7,11,20,0.8);font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#bde6ff;border:1px solid rgba(255,255,255,0.12)}
  .ui-card{padding:22px;display:flex;flex-direction:column;gap:14px;min-height:540px}
  .ui-card h1{margin:0;font-size:24px;letter-spacing:0.03em}
  .ui-card p{margin:0;color:var(--muted);line-height:1.5;font-size:14px}
  .controls{display:flex;gap:10px;flex-wrap:wrap}
  .btn{padding:10px 14px;border:none;border-radius:12px;background:linear-gradient(180deg,#3f72ff,#1b44c4);color:white;font-weight:700;cursor:pointer;box-shadow:0 10px 22px rgba(36,75,219,0.32)}
  .btn.secondary{background:linear-gradient(180deg,#3d4755,#232b36)}
  .btn.small{padding:8px 11px;font-size:13px}
  .seg-list{display:flex;flex-direction:column;gap:8px;max-height:270px;overflow:auto;padding-right:4px}
  .seg-row{display:flex;gap:8px;align-items:center}
  .seg-row input[type="text"]{flex:1;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:var(--text)}
  .seg-row input[type="color"]{width:40px;height:38px;padding:0;border:none;border-radius:10px;background:transparent;cursor:pointer}
  .seg-row button{padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:white;cursor:pointer}
  .footer{margin-top:auto;color:var(--muted);font-size:12px;line-height:1.5}
  #overlay-winner{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);pointer-events:none;display:none;font-size:28px;font-weight:800;padding:12px 18px;border-radius:999px;background:rgba(7,11,20,0.82);border:1px solid rgba(255,255,255,0.16);box-shadow:0 10px 30px rgba(0,0,0,0.35)}
  @media (max-width: 860px){
    .app{grid-template-columns:1fr;min-height:auto;height:auto}
    .ui-card{min-height:auto}
    .wheel-card{min-height:460px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="wheel-card">
    <div class="wheel-shell">
      <div class="pointer"></div>
      <div class="wheel-shadow"></div>
      <svg id="wheelSvg" viewBox="0 0 400 400" role="img" aria-label="Spin the wheel"></svg>
      <div class="hud" id="hud">Tap spin to play</div>
    </div>
    <div id="overlay-winner"></div>
  </div>
  <div class="ui-card">
    <h1>Spin the Wheel</h1>
    <p>Fresh indie-style wheel with editable slices, a bold pointer, and a smooth spin-to-win loop.</p>
    <div class="controls">
      <button class="btn" id="spinBtn">SPIN</button>
      <button class="btn secondary" id="stopBtn">BRAKE</button>
    </div>
    <div class="seg-list" id="segList"></div>
    <div class="controls">
      <button class="btn small secondary" id="addSeg">+ Add Slice</button>
      <button class="btn small secondary" id="resetSeg">Reset</button>
    </div>
    <div class="footer">The wheel is now a visible 2D game-style graphic, so it works instantly without any black space or missing rendering.</div>
  </div>
</div>
<script>
const defaultSegments = [
  {label:'Prize A', color:'#ff6b6b'},
  {label:'Prize B', color:'#ffd56b'},
  {label:'Prize C', color:'#6bffcd'},
  {label:'Prize D', color:'#6bb7ff'},
  {label:'Prize E', color:'#c56bff'},
  {label:'Prize F', color:'#6bff8f'}
];

let segments = [...defaultSegments];
let rotation = 0;
let velocity = 0;
let isSpinning = false;
let lastFrame = performance.now();
let spinTimer = 0;
let lastWinner = '';
const wheelSvg = document.getElementById('wheelSvg');
const overlayWinner = document.getElementById('overlay-winner');
const hud = document.getElementById('hud');

function escapeHtml(value){
  return String(value)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function randomColor(){
  const palette = ['#ff6b6b','#ffd56b','#6bffcd','#6bb7ff','#c56bff','#6bff8f','#ff9f6b','#8affd5'];
  return palette[Math.floor(Math.random()*palette.length)];
}

function wrapLabel(label){
  const words = String(label).trim().split(/\s+/).filter(Boolean);
  if(words.length <= 2) return words;
  const lines = [];
  let current = '';
  words.forEach((word) => {
    const next = current ? `${current} ${word}` : word;
    if(next.length <= 12){
      current = next;
    } else {
      if(current) lines.push(current);
      current = word;
    }
  });
  if(current) lines.push(current);
  return lines.slice(0, 3);
}

function renderWheel(){
  const cx = 200;
  const cy = 200;
  const radius = 150;
  if(!segments.length) return;
  const sectorAngle = 360 / segments.length;
  const slices = [];

  segments.forEach((segment, index) => {
    const start = -sectorAngle / 2 + index * sectorAngle;
    const end = start + sectorAngle;
    const startRad = (start - 90) * Math.PI / 180;
    const endRad = (end - 90) * Math.PI / 180;
    const path = `M ${cx} ${cy} L ${cx + Math.cos(startRad) * radius} ${cy + Math.sin(startRad) * radius} A ${radius} ${radius} 0 0 1 ${cx + Math.cos(endRad) * radius} ${cy + Math.sin(endRad) * radius} Z`;
    const mid = (start + end) / 2;
    const labelAngle = (mid - 90) * Math.PI / 180;
    const labelRadius = radius * 0.72;
    const x = cx + Math.cos(labelAngle) * labelRadius;
    const y = cy + Math.sin(labelAngle) * labelRadius;
    const textRotation = mid + 90;
    const lines = wrapLabel(segment.label);
    const lineHeight = 16;
    const textY = y - ((lines.length - 1) * lineHeight) / 2;
    const lineMarkup = lines.map((line, lineIndex) => `<tspan x="${x}" dy="${lineIndex === 0 ? 0 : lineHeight}">${escapeHtml(line)}</tspan>`).join('');
    slices.push(`
      <path d="${path}" fill="${segment.color}" stroke="#0d1118" stroke-width="4" />
      <path d="${path}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
      <text x="${x}" y="${textY}" fill="#fff" font-size="${Math.max(12, 16 - Math.max(0, segments.length - 6))}" font-family="Inter, Arial, sans-serif" font-weight="700" text-anchor="middle" dominant-baseline="middle" transform="rotate(${textRotation} ${x} ${y})">${lineMarkup}</text>
    `);
  });

  wheelSvg.innerHTML = `
    <defs>
      <linearGradient id="wheelGlow" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
      </linearGradient>
    </defs>
    <circle cx="200" cy="200" r="172" fill="url(#wheelGlow)" />
    ${slices.join('')}
    <circle cx="200" cy="200" r="166" fill="none" stroke="#f2d58d" stroke-width="8" stroke-dasharray="2 10" opacity="0.7" />
    <circle cx="200" cy="200" r="44" fill="#080b13" stroke="#fde7b2" stroke-width="6" />
    <circle cx="200" cy="200" r="24" fill="#1d2433" stroke="#f8dc93" stroke-width="3" />
  `;
  updateWheel();
}

function updateWheel(){
  wheelSvg.style.transform = `rotate(${rotation}deg)`;
}

function renderSegmentList(){
  const segList = document.getElementById('segList');
  segList.innerHTML = '';
  segments.forEach((segment, index) => {
    const row = document.createElement('div');
    row.className = 'seg-row';
    const labelInput = document.createElement('input');
    labelInput.type = 'text';
    labelInput.value = segment.label;
    labelInput.addEventListener('input', (event) => {
      segment.label = event.target.value;
      renderWheel();
    });
    const colorInput = document.createElement('input');
    colorInput.type = 'color';
    colorInput.value = segment.color;
    colorInput.addEventListener('input', (event) => {
      segment.color = event.target.value;
      renderWheel();
    });
    const deleteButton = document.createElement('button');
    deleteButton.textContent = '✕';
    deleteButton.addEventListener('click', () => {
      segments.splice(index, 1);
      if(!segments.length) segments.push({label:'Prize', color:'#ff6b6b'});
      renderSegmentList();
      renderWheel();
    });
    row.appendChild(labelInput);
    row.appendChild(colorInput);
    row.appendChild(deleteButton);
    segList.appendChild(row);
  });
}

function spinWheel(){
  if(!segments.length) return;
  isSpinning = true;
  velocity = 6 + Math.random() * 6;
  if(lastWinner){
    velocity += 1.4;
  }
  spinTimer = 0;
  hud.textContent = 'Spinning...';
}

function brakeWheel(){
  velocity = Math.max(0.6, velocity * 0.22);
  if(velocity < 0.75){
    velocity = 0.5;
  }
}

function determineWinner(){
  if(!segments.length) return null;
  const sectorAngle = 360 / segments.length;
  const pointerAngle = 270;
  const normalizedRotation = ((rotation % 360) + 360) % 360;
  const adjusted = (pointerAngle - normalizedRotation + 360) % 360;
  const index = Math.min(segments.length - 1, Math.floor(adjusted / sectorAngle));
  return segments[index];
}

function announceWinner(){
  const winner = determineWinner();
  if(!winner) return;
  lastWinner = winner.label;
  overlayWinner.textContent = `🎉 ${winner.label}`;
  overlayWinner.style.display = 'block';
  setTimeout(() => {
    overlayWinner.style.display = 'none';
  }, 2600);
  hud.textContent = 'Winner locked';
}

function tick(now){
  const delta = Math.min(0.033, (now - lastFrame) / 1000);
  lastFrame = now;
  if(isSpinning){
    const drag = 0.018 + velocity * 0.004;
    velocity = Math.max(0, velocity - drag * delta * 60);
    rotation += velocity * 115 * delta;
    if(velocity < 0.015 && spinTimer > 0.8){
      isSpinning = false;
      velocity = 0;
      announceWinner();
      hud.textContent = 'Ready to spin';
    }
    spinTimer += delta;
  }
  updateWheel();
  requestAnimationFrame(tick);
}

function attachEvents(){
  document.getElementById('spinBtn').addEventListener('click', spinWheel);
  document.getElementById('stopBtn').addEventListener('click', brakeWheel);
  document.getElementById('addSeg').addEventListener('click', () => {
    segments.push({label:'New Prize', color:randomColor()});
    renderSegmentList();
    renderWheel();
  });
  document.getElementById('resetSeg').addEventListener('click', () => {
    segments = [...defaultSegments];
    renderSegmentList();
    renderWheel();
  });
  wheelSvg.addEventListener('click', spinWheel);
  window.addEventListener('keydown', (event) => {
    if(event.key === ' '){
      event.preventDefault();
      spinWheel();
    }
  });
}

renderSegmentList();
renderWheel();
attachEvents();
requestAnimationFrame(tick);
</script>
</body>
</html>
